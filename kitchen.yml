---
driver:
  name: vagrant
  gui: false

provisioner:
  name: chef_infra
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'chef' %>
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  source: &source_run_list
    - recipe[test::source]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  source: &source_verifier
    inspec_tests:
      - path: test/integration/source

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: source
    run_list: *source_run_list
    verifier: *source_verifier
